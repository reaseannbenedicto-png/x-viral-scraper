name: Daily Viral Tweet Scrape

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create results directory
        run: mkdir -p results

      - name: Run scraper
        run: |
          python -c "
          import requests, json, os
          headers = {
            'x-rapidapi-host': 'twitter-v24.p.rapidapi.com',
            'x-rapidapi-key': os.environ.get('RAPIDAPI_KEY')
          }
          r = requests.get('https://twitter-v24.p.rapidapi.com/search/', headers=headers, params={'query': 'ai', 'section': 'top', 'limit': 5})
          print(r.status_code)
          print(json.dumps(r.json(), indent=2)[:2000])
          "
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraped-tweets
          path: results/
          retention-days: 30

      - name: Extract top 3 trends
        run: python extract_trends.py

      - name: Commit trends summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trends.json || echo "No trends.json to add"
          git diff --staged --quiet || git commit -m "Update viral trends: $(date)"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
